<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MealBook</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
 
    <div class="container">
    
    <h1>🍱 MealBook</h1>

    <h2>家庭餐食管理 App</h2>
        
<div class="date-card">

    <button id="prevDay">◀️</button>

    <div>

        <h3>📅 日期</h3>

        <p id="today"></p>

    </div>

    <button id="nextDay">▶️</button>

</div>
      
<div class="expense-card">
    
    <label>🍳 早餐</label>
    <input type="text" id="breakfast" placeholder="今天早餐吃什麼？">

    <label>🍜 午餐</label>
    <input type="text" id="lunch" placeholder="今天午餐吃什麼？">

    <label>🍛 晚餐</label>
    <input type="text" id="dinner" placeholder="今天晚餐吃什麼？">

    <label>🍰 點心</label>
    <input type="text" id="snack" placeholder="今天點心吃什麼？">

    <label>📝 備註</label>
    <textarea id="note" rows="4" placeholder="今天有什麼想記錄的？"></textarea>
    <button id="saveBtn">💾 儲存今天</button>
</div>

<div class="meal-card">    
            
<h3>💰 今日花費</h3>
            
    <label>分類</label>
        <select id="expenseCategory">
            <option value="肉類">🥩 肉類</option>
            <option value="蔬菜">🥬 蔬菜</option>
            <option value="水果">🍎 水果</option>
            <option value="海鮮">🐟 海鮮</option>
            <option value="乳製品">🥛 乳製品</option>
            <option value="飲料">🧃 飲料</option>
            <option value="外食">🍜 外食</option>
            <option value="調味料">🧂 調味料</option>
            <option value="其他">📦 其他</option>
</select>
    <input
        type="text"
        id="expenseName"
        placeholder="品項（例如：雞腿）">

    <input
        type="number"
        id="expenseAmount"
        placeholder="金額">

    <button id="addExpense">
        ➕ 新增花費
    </button>

    <ul id="expenseList"></ul>

    <h3>📊 分類統計</h3>

<ul id="categorySummary"></ul>

    <h2>
        今日總計：
        $<span id="total">0</span>
    </h2>

</div>
            
    <p>歡迎使用 MealBook！</p>

    <button>開始記錄今天</button>

    </div>

<script src="app.js"></script>
</body>
</html>
